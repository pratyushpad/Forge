<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Forge">
  <!--
    Forge favicon. A bold angular "F" monogram (original work, in the style of
    geometric interlaced lettermarks) drawn white on a coal->iron tile to echo
    the reference mark, with 45-degree blade-cut arm ends and a pointed stem
    foot. Solid fills (not thin line-art) so it stays legible at 16px in a tab.
    The full interlaced/ribbon logo belongs at large sizes (site header / OG).
  -->
  <defs>
    <linearGradient id="tile" x1="20" y1="0" x2="20" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1c1815"/>
      <stop offset="1" stop-color="#0c0a09"/>
    </linearGradient>
  </defs>

  <rect x="1" y="1" width="38" height="38" rx="9" fill="url(#tile)" stroke="#2c251f"/>

  <!-- Bold angular F: chamfered stem with a pointed foot + two blade-cut arms -->
  <g fill="#f5efe9">
    <path d="M11 9 H17 V27 L14 31 L11 27 Z"/>
    <path d="M11 9 H30 L24 16 H11 Z"/>
    <path d="M11 19 H26 L20 25 H11 Z"/>
  </g>
</svg>
